name: Sync Vercel Production Alias

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production-alias-main
  cancel-in-progress: true

permissions:
  contents: read
  statuses: read

jobs:
  sync-alias:
    name: Point ayurjess.vercel.app to latest production deploy
    runs-on: ubuntu-latest
    env:
      VERCEL_ALIAS: ayurjess.vercel.app
      VERCEL_SCOPE: lukete96s-projects
    steps:
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Wait for Vercel to mark this commit as deployed
        id: wait-for-vercel-status
        env:
          GIT_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 40); do
            response="$(curl -sS --fail \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${GIT_SHA}/status")"

            vercel_state="$(printf '%s' "${response}" \
              | jq -r '.statuses[] | select(.context == "Vercel") | .state' \
              | head -n 1)"

            vercel_target_url="$(printf '%s' "${response}" \
              | jq -r '.statuses[] | select(.context == "Vercel") | .target_url' \
              | head -n 1)"

            if [ -n "${vercel_state}" ]; then
              echo "Found Vercel status ${vercel_state} for ${GIT_SHA}"
            fi

            if [ "${vercel_state}" = "success" ]; then
              deployment_id="$(printf '%s' "${vercel_target_url}" | sed -E 's#.*/##')"

              if [ -z "${deployment_id}" ]; then
                echo "Vercel status succeeded but did not expose a deployment ID." >&2
                exit 1
              fi

              echo "deployment_id=dpl_${deployment_id}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            if [ "${vercel_state}" = "failure" ] || [ "${vercel_state}" = "error" ]; then
              echo "Vercel reported ${vercel_state} for commit ${GIT_SHA}." >&2
              exit 1
            fi

            echo "Attempt ${attempt}/40: deployment not ready yet, waiting 15s..."
            sleep 15
          done

          echo "Timed out waiting for Vercel to mark commit ${GIT_SHA} as deployed." >&2
          exit 1

      - name: Repoint production alias
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel alias set \
            "${{ steps.wait-for-vercel-status.outputs.deployment_id }}" \
            "${VERCEL_ALIAS}" \
            --scope "${VERCEL_SCOPE}" \
            --token "${VERCEL_TOKEN}"
